version: '3'

services:
  postgres:
    image: postgres:16
    environment:
      - 'POSTGRES_DB=etutor_cypher'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=etutor_cypher'
    ports:
      - '5434:5432'
  neo4j:
    image: neo4j:5
    environment:
      - 'NEO4J_AUTH=neo4j/secretpassword'
    ports:
      - '7474:7474'
      - '7687:7687'
